version: "3.8"

services:
  german-camp:
    build: .
    container_name: german-mastery-camp
    ports:
      - "8501:8501"
    volumes:
      - .:/app
      - ./secrets:/app/.streamlit/secrets.toml:ro
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
